name: Frontend CI/CD (Self-Hosted)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update Docker Container
        run: |
          # اضافه کردن مسیر پروژه به عنوان دایرکتوری امن برای گیت
          git config --global --add safe.directory /var/www/karbama/frontend
          
          # رفتن به پوشه و آپدیت کد بدون نیاز به sudo
          cd /var/www/karbama/frontend
          git pull origin main
          
          # بیلد مجدد کانتینر فرانت (چون کاربر github عضو گروه docker است نیاز به sudo ندارد)
          cd /var/www/karbama
          docker compose up -d --build frontend
