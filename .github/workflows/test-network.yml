name: Test VPS Network

on:
  workflow_dispatch:

jobs:
  test-network:
    runs-on: ubuntu-latest

    steps:
      - name: Show target without revealing secrets
        run: |
          echo "Testing connection to VPS..."
          echo "Port is configured."

      - name: Test TCP connection to SSH port
        run: |
          nc -vz -w 10 ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT }}

      - name: Test ping
        run: |
          ping -c 4 ${{ secrets.SERVER_HOST }} || true
